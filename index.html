<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>To U Do - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="auth-logo">
            <h1 class="display-lg text-gold">To U Do</h1>
            <p class="label-caps mt-2">Productivity Reimagined</p>
        </div>

        <form action="pages/tarefas.html" class="mt-8">
            <div class="input-group">
                <label class="label-caps text-gold">ID do Usuário</label>
                <div class="input-field">
                    <span>👤</span>
                    <input type="text" placeholder="Usuário/Telefone/E-mail" required>
                </div>
            </div>

            <div class="input-group">
                <label class="label-caps">Chave de Acesso</label>
                <div class="input-field">
                    <span>🔒</span>
                    <input type="password" placeholder="Senha" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary mt-4">Entrar</button>
        </form>

        <div class="text-center mt-8">
            <a href="pages/recuperar.html" class="body-md" style="text-decoration: none;">Esqueceu sua senha?</a>
        </div>
        
        <div class="text-center mt-8" style="margin-top: auto;">
            <p class="body-md">Não tem uma conta? <a href="pages/registro.html" class="text-gold" style="text-decoration: none; font-weight: 600;">Criar</a></p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
