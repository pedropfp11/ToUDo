<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To U Do - Detalhes da Tarefa</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <header style="justify-content: space-between; position: relative;">
            <a href="tarefas.html" style="color: var(--tertiary); text-decoration: none; font-size: 24px;">←</a>
            <h1 class="headline-md text-gold">Detalhes</h1>
            <span style="font-size: 20px; color: var(--error); cursor: pointer;" onclick="location.href='tarefas.html'">🗑️</span>
        </header>

        <div class="mt-8">
            <span class="label-caps text-gold">Matéria / Categoria</span>
            <h2 class="display-lg mt-2">Matemática - Pág. 143</h2>
            <p class="body-md mt-4">📅 Prazo: Terça-Feira</p>
        </div>

        <div class="mt-8">
            <h3 class="label-caps mb-2">Subtarefas</h3>
            <ul class="task-list">
                <li class="task-card" style="padding: 12px 16px; border-radius: 16px;">
                    <div class="checkbox"></div>
                    <span class="body-lg">Resolver exercícios 1 a 5</span>
                </li>
                <li class="task-card" style="padding: 12px 16px; border-radius: 16px;">
                    <div class="checkbox"></div>
                    <span class="body-lg">Revisar fórmulas de geometria</span>
                </li>
            </ul>
        </div>

        <div class="input-group mt-8">
            <label class="label-caps">Notas / Observações</label>
            <div class="input-field" style="align-items: flex-start; min-height: 100px;">
                <textarea placeholder="Adicione observações aqui..." style="background: none; border: none; color: var(--text-main); width: 100%; font-family: var(--font-body); font-size: 14px; outline: none; resize: none;"></textarea>
            </div>
        </div>

        <div style="margin-top: auto; padding-top: 32px;">
            <button class="btn btn-primary" onclick="location.href='tarefas.html'">Salvar Alterações</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item"><span>☀️</span>Day</a>
        <a href="#" class="nav-item"><span>⭐</span>Star</a>
        <a href="#" class="nav-item"><span>📅</span>Plan</a>
        <a href="tarefas.html" class="nav-item active"><span style="color: var(--tertiary)">📋</span>Tasks</a>
    </nav>
    <script src="../script.js"></script>
</body>
</html>
