<!DOCTYPE html>

<head>

    <title>To U Do - Perfil</title>

</head>
<body>
    <div class="container">
        <header style="justify-content: center; position: relative;">
            <a href="tarefas.html" style="position: absolute; left: 0; color: var(--tertiary); text-decoration: none; font-size: 24px;">←</a>

        <div style="text-align: center; margin: 32px 0;">
            <div style="width: 100px; height: 100px; border-radius: 50%; background: var(--surface-variant); margin: 0 auto 16px auto; border: 2px solid var(--tertiary); position: relative;">
                <div style="position: absolute; bottom: 0; right: 0; background: var(--tertiary); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: var(--surface-1);">✎</div>
            </div>

            <p class="body-md">pedrofranco11@gmail.com</p>
        </div>

        <h3 class="label-caps text-gold mb-2">⚙ Configurações</h3>
        
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <div class="task-card" style="padding: 16px 24px; border-radius: 24px; justify-content: space-between;">
                <div style="display: flex; gap: 16px; align-items: center;">
                    <span>🌙</span>
                    <span class="body-lg">Tema</span>
                </div>
                <div style="display: flex; gap: 8px; align-items: center; color: var(--secondary);">
                    <span class="body-md">Escuro</span>
                    <span>›</span>
                </div>
            </div>

            <div class="task-card" style="padding: 16px 24px; border-radius: 24px; justify-content: space-between;">
                <div style="display: flex; gap: 16px; align-items: center;">
                    <span>🔔</span>
                    <span class="body-lg">Notificações</span>
                </div>
                <span style="color: var(--secondary);">›</span>
            </div>
            
            <div class="task-card" style="padding: 16px 24px; border-radius: 24px; justify-content: space-between;">
                <div style="display: flex; gap: 16px; align-items: center;">
                    <span>🛡️</span>
                    <span class="body-lg">Segurança</span>
                </div>
                <span style="color: var(--secondary);">›</span>
            </div>
        </div>

        <a href="../index.html" class="btn btn-ghost mt-8" style="border-color: #48464b; color: #ffb4ab;">Sair da conta</a>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item"><span>☀️</span>Day</a>
