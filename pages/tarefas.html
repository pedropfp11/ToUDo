<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To U Do - Atividades</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; align-items: center; gap: 16px;">
                <span style="font-size: 24px; cursor: pointer;" onclick="location.href='perfil.html'">☰</span>
                <h1 class="headline-md text-gold">Atividades</h1>
            </div>
            <div style="display: flex; gap: 16px; font-size: 20px;">
                <span>🔍</span>
                <span>⋮</span>
            </div>
        </header>

        <div style="height: 4px; background: var(--surface-variant); border-radius: 2px; margin-bottom: 24px;">
            <div style="height: 100%; width: 40%; background: var(--tertiary); border-radius: 2px;"></div>
        </div>

        <h2 class="label-caps mb-2" style="color: var(--secondary)">Pending Tasks</h2>
        
        <ul class="task-list">
            <li>
                <a href="detalhes.html" class="task-card urgent">
                    <div class="checkbox"></div>
                    <div class="task-content">
                        <h3 class="body-lg">Matemática - Pág. 143</h3>
                        <p class="body-md">📅 Terça-Feira</p>
                    </div>
                    <span class="text-gold">☆</span>
                </a>
            </li>
            
            <li>
                <a href="detalhes.html" class="task-card">
                    <div class="checkbox"></div>
                    <div class="task-content">
                        <h3 class="body-lg">História - Pág. 189</h3>
                        <p class="body-md">📅 Sexta-Feira</p>
                    </div>
                    <span>☆</span>
                </a>
            </li>
        </ul>

        <h2 class="label-caps mt-8 mb-2">Concluídas 3</h2>
        <ul class="task-list">
            <li>
                <div class="task-card completed">
                    <div class="checkbox">
                        <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M1 5L5 9L13 1" stroke="#0B0910" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    <div class="task-content">
                        <h3 class="body-lg">Filosofia - Pág. 26</h3>
                    </div>
                    <span style="color: var(--secondary); cursor: pointer;">🗑️</span>
                </div>
            </li>
        </ul>
    </div>

    <button class="fab" id="fab-add-task">+</button>

    <nav class="bottom-nav">
        <a href="#" class="nav-item"><span>☀️</span>Day</a>
        <a href="#" class="nav-item"><span>⭐</span>Star</a>
        <a href="#" class="nav-item"><span>📅</span>Plan</a>
        <a href="tarefas.html" class="nav-item active"><span style="color: var(--tertiary)">📋</span>Tasks</a>
    </nav>

    <div class="modal-overlay" id="modal-add-task">
        <div class="modal-content">
            <h2 class="headline-md mb-2">Adicionar tarefa</h2>
            
            <div class="input-group mt-4">
                <label class="label-caps text-gold">Nome da tarefa:</label>
                <div class="input-field">
                    <input type="text" placeholder="Digite o nome da tarefa">
                </div>
            </div>

            <div class="flex-row mt-8">
                <button class="btn btn-primary" onclick="location.reload();">Criar Tarefa</button>
                <button class="btn btn-ghost" id="btn-cancel-task">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="../script.js"></script>
</body>
</html>
