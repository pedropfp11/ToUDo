<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To U Do - Recuperação</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <main class="container">
        <header style="justify-content: flex-start; gap: 16px;">
            <a href="../index.html" style="color: var(--tertiary); text-decoration: none; font-size: 24px;">←</a>
            <h1 class="headline-md text-gold">Recuperar Acesso</h1>
        </header>

        <div class="mt-4">
            <p class="body-md">Insira o e-mail associado à sua conta. Enviaremos as instruções para redefinir sua chave de acesso.</p>
        </div>

        <form action="../index.html" class="mt-8" onsubmit="alert('Instruções enviadas com sucesso!');">
            <div class="input-group">
                <label class="label-caps text-gold">E-mail de Cadastro</label>
                <div class="input-field">
                    <span>✉️</span>
                    <input type="email" placeholder="seu-email@exemplo.com" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary mt-4">Enviar Instruções</button>
        </form>
    </main>
    <script src="../script.js"></script>
</body>
</html>
