<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To U Do - Cadastro</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <main class="container">
        <header style="justify-content: flex-start; gap: 16px;">
            <a href="../index.html" style="color: var(--tertiary); text-decoration: none; font-size: 24px;">←</a>
            <h1 class="headline-md text-gold">Criar Conta</h1>
        </header>

        <form action="tarefas.html" class="mt-8">
            <div class="input-group">
                <label class="label-caps">Nome Completo</label>
                <div class="input-field">
                    <span>👤</span>
                    <input type="text" placeholder="Seu nome" required>
                </div>
            </div>

            <div class="input-group">
                <label class="label-caps text-gold">E-mail</label>
                <div class="input-field">
                    <span>✉️</span>
                    <input type="email" placeholder="seu-email@exemplo.com" required>
                </div>
            </div>

            <div class="input-group">
                <label class="label-caps">Chave de Acesso</label>
                <div class="input-field">
                    <span>🔒</span>
                    <input type="password" placeholder="Crie uma senha" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary mt-4">Registrar e Entrar</button>
        </form>

        <div class="text-center mt-8" style="margin-top: auto;">
            <p class="body-md">Já tem uma conta? <a href="../index.html" class="text-gold" style="text-decoration: none; font-weight: 600;">Fazer Login</a></p>
        </div>
    </main>
    <script src="../script.js"></script>
</body>
</html>
